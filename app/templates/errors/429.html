<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Слишком много запросов</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        .image-container {
            width: 100%;
            margin: 0 auto;
        }

        .image-container img {
            width: 100%;
            height: auto;
            max-height: 90vh;
            object-fit: contain;
            display: block;
        }

        @media (max-width: 480px) {
            .container {
                max-width: 100%;
                padding: 0 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="image-container">
            <img src="/static/img/429.jpg" alt="Слишком много запросов">
        </div>
    </div>
</body>
</html>
